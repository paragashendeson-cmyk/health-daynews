<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Med IT Daily Feishu</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2a37;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 8px 0; line-height: 1.65; }
    code {
      background: #eef2ff;
      border: 1px solid #dbe4ff;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Med IT Daily Feishu 服务已部署</h1>
    <p>这是一个定时任务服务，没有可视化页面。</p>
    <p>手动触发地址：<code>/api/digest_cron?token=你的CRON_SECRET</code></p>
    <p>如需自动执行，请在 Vercel 的 Cron 配置里调用 <code>/api/digest_cron</code>。</p>
  </main>
</body>
</html>
